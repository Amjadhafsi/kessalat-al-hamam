<html lang="ar" dir="rtl">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="العب الآن لعبة كسالة الحمام، أول لعبة رعب مغربية 3D من تطوير أمجد الحفصي. مغامرة في قلب الحمام الشعبي!">
    <meta name="keywords" content="كسالة الحمام, لعبة رعب مغربية, لعبة رعب 3D, أمجد الحفصي, العاب رعب, العاب مجانية">

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        #splash-screen {
            position: fixed; width: 100%; height: 100%; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            animation: fadeOut 2s ease-in-out 2s forwards;
        }
        .splash-logo { color: #ff3300; font-size: 5rem; text-shadow: 0 0 30px #ff3300; animation: pulse 1.5s infinite; }
        .splash-text { color: white; font-size: 2rem; margin-top: 20px; letter-spacing: 5px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

        #lang-selector { position: absolute; top: 10px; left: 10px; z-index: 3000; display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 5px 10px; cursor: pointer; border-radius: 5px; font-size: 0.8rem; transition: 0.3s; }
        .lang-btn:hover, .lang-btn.active { background: #ff3300; border-color: #ff3300; }

        #main-menu {
            position: fixed; width: 100%; height: 100%; z-index: 2000;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }

        .container { 
            background: rgba(15,15,15,0.98); padding: 30px; border-radius: 25px; 
            border: 4px solid #ff3300; width: 95%; max-width: 700px; box-shadow: 0 0 50px rgba(255,51,0,0.4);
            backdrop-filter: blur(5px);
        }

        h1 { color: #ff3300; font-size: 2.5rem; margin-bottom: 5px; text-shadow: 3px 3px #000; }
        .location-tag { background: #ff3300; color: white; padding: 4px 15px; border-radius: 50px; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full-width-setting { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #ddd; text-align: right; }
        .ltr label { text-align: left; }

        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; font-size: 0.9rem; outline: none; cursor: pointer; }
        select:focus { border-color: #ff3300; }
        
        .btn-start { background: #ff3300; color: #fff; font-size: 20px; padding: 15px; border-radius: 12px; border: none; width: 100%; cursor: pointer; font-weight: bold; transition: 0.4s; }
        .btn-start:hover { background: #ff5522; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,51,0,0.4); }

        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.85); padding: 15px 20px; border-radius: 12px; display: none; border-left: 5px solid #ff3300; backdrop-filter: blur(4px); pointer-events: none; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 28px; z-index: 100; display: none; pointer-events: none; text-shadow: 0 0 5px #000; }
        #interact-msg { position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #00ffff; font-size: 1.8rem; padding: 15px 30px; border-radius: 50px; border: 3px solid #00ffff; display: none; z-index: 101; white-space: nowrap; backdrop-filter: blur(4px); box-shadow: 0 0 20px rgba(0,255,255,0.5); text-shadow: 0 0 10px cyan; font-weight: bold; }
        #tap-counter { position: fixed; top: 100px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #00ffff; color: #00ffff; font-size: 1.2rem; z-index: 100; display: none; backdrop-filter: blur(4px); box-shadow: 0 0 15px rgba(0,255,255,0.3); }
        #instructions { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; font-size: 0.9rem; color: #ccc; border: 1px solid #ff3300; z-index: 102; pointer-events: none; backdrop-filter: blur(2px); }
        
        #jumpscare, #win-screen { position: fixed; width: 100%; height: 100%; z-index: 3000; background: #000; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .the-end, .game-over-text { font-size: 8rem; font-weight: 900; letter-spacing: 10px; animation: glow 2s infinite alternate; }
        .the-end { color: #ff3300; text-shadow: 0 0 30px #ff0000; }
        .game-over-text { color: #880000; text-shadow: 0 0 30px #440000; }
        .end-message { font-size: 2rem; color: #ffaa00; margin-top: 20px; text-shadow: 0 0 10px #ff6600; }
        .btn-back-menu { margin-top: 40px; padding: 15px 40px; background: #ff3300; color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-back-menu:hover { background: #ff5522; transform: scale(1.1); }
        @keyframes glow { from { text-shadow: 0 0 20px #ff0000, 0 0 30px #ff3300; } to { text-shadow: 0 0 40px #ff0000, 0 0 60px #ff6600; transform: scale(1.05); } }

        #touch-controls { position: fixed; bottom: 20px; left: 0; right: 0; z-index: 1000; display: none; justify-content: space-between; padding: 0 15px; pointer-events: none; }
        #left-joystick { width: 120px; height: 120px; background: rgba(30,30,30,0.85); border: 3px solid #ff3300; border-radius: 60px; position: relative; pointer-events: auto; backdrop-filter: blur(4px); box-shadow: 0 0 20px rgba(255,51,0,0.5); }
        #joystick-handle { width: 50px; height: 50px; background: #ff3300; border-radius: 25px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #ff3300; transition: transform 0.05s; pointer-events: none; }
        #right-buttons { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .action-btn { width: 70px; height: 70px; border-radius: 35px; background: rgba(30,30,30,0.85); border: 3px solid #ff3300; color: #ff3300; font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); box-shadow: 0 0 15px rgba(255,51,0,0.5); transition: all 0.1s; }
        .action-btn:active { background: #ff3300; color: white; transform: scale(0.95); }
        #sprint-btn { border-color: #00ff00; color: #00ff00; }
        #crouch-btn { border-color: #ffff00; color: #ffff00; }
        #jump-btn { border-color: #00ffff; color: #00ffff; }
        #interact-btn { border-color: #ff00ff; color: #ff00ff; }
        #flashlight-btn { border-color: #ffaa00; color: #ffaa00; }
        #look-area { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; display: none; pointer-events: auto !important; background: transparent; }
        .look-area-active { background: rgba(255,51,0,0.05) !important; }

        #earnings-stats { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px 20px; border-radius: 10px; border: 2px solid #00ff00; z-index: 2000; font-size: 1.2rem; display: none; backdrop-filter: blur(4px); }
        #earnings-history { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; border-radius: 5px; font-size: 0.9rem; z-index: 2000; border: 1px solid #00ff00; }

        #ad-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; }
        #search-progress { width: 0%; height: 100%; background: #ff3300; transition: width 5s linear; }
        @keyframes adPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) {
            .the-end, .game-over-text { font-size: 3.5rem; }
            h1 { font-size: 1.8rem; }
            .end-message { font-size: 1.2rem; }
        }
    </style>
</head>
<body class="rtl">

    <div id="splash-screen"><div><div class="splash-logo">👻</div><div class="splash-text">كسالة الحمام</div></div></div>

    <div id="lang-selector">
        <button class="lang-btn active" onclick="setLanguage('ar')">العربية</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
    </div>

    <div id="main-menu">
        <div class="container">
            <h1 id="ui-title">👻 كسالة الحمام 🐰</h1>
            <div class="location-tag" id="ui-location">📍 ساحة مدرسة مولاي تهامي</div>
            <div class="settings-grid">
                <div class="full-width-setting">
                    <label id="ui-label-diff">مستوى الصعوبة:</label>
                    <select id="diff-select"></select>
                </div>
                <div>
                    <label id="ui-label-graphics">جودة الرسومات:</label>
                    <select id="graphics-quality"></select>
                </div>
                <div>
                    <label id="ui-label-brightness">مستوى السطوع:</label>
                    <select id="brightness-level"></select>
                </div>
                <div class="full-width-setting">
                    <label id="ui-label-mode">الوضع المحيط:</label>
                    <select id="game-mode"></select>
                </div>
            </div>
            <button id="start-btn" class="btn-start" onclick="startGame()">دخول ساحة المدرسة 🏫</button>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto"></audio>
    <audio id="sfx-step" loop preload="auto" src="https://www.soundjay.com/misc/sounds/footstep-on-gravel-1.mp3"></audio>
    <audio id="sfx-step-fast" loop preload="auto" src="https://www.soundjay.com/misc/sounds/footstep-on-gravel-2.mp3"></audio>
    <audio id="sfx-tap" preload="auto" src="https://www.soundjay.com/misc/sounds/water-tap-1.mp3"></audio>
    <audio id="sfx-tap-close" preload="auto" src="https://www.soundjay.com/misc/sounds/valve-close-1.mp3"></audio>
    <audio id="sfx-ghost" preload="auto" src="https://www.soundjay.com/horror/sounds/ghost-1.mp3"></audio>
    <audio id="sfx-scream" preload="auto" src="https://www.soundjay.com/horror/sounds/scream-1.mp3"></audio>
    <audio id="sfx-heartbeat" loop preload="auto" src="https://www.soundjay.com/human/sounds/heartbeat-1.mp3"></audio>
    <audio id="sfx-success" preload="auto" src="https://www.soundjay.com/misc/sounds/bell-ringing-1.mp3"></audio>

    <div id="jumpscare">
        <div class="game-over-text">GAME OVER</div>
        <div class="end-message" id="death-msg">أمسكت بك "كسالة الحمام" أو "الكاركري"!</div>
        <button class="btn-back-menu ui-back-btn" onclick="returnToMenu()">العودة للقائمة الرئيسية</button>
    </div>

    <div id="win-screen">
        <div class="the-end">THE END</div>
        <div class="end-message" id="win-msg">لقد هزمت الرعب في ساحة مدرسة مولاي تهامي</div>
        <button class="btn-back-menu ui-back-btn" onclick="returnToMenu()">العودة للقائمة الرئيسية</button>
    </div>

    <div id="hud">
        <div id="ui-hud-loc" style="color:#ff3300; font-weight:bold; font-size:1.1rem;">ساحة مدرسة مولاي تهامي</div>
        <div><span id="ui-hud-taps">الصنابير المغلقة:</span> <span id="count">0</span> / 3</div>
        <div>⏱️ <span id="time">00:00</span></div>
        <div>🔦 <span id="battery">100</span>%</div>
        <div>👻 المسافة: <span id="distance">?</span>م</div>
        <div>🐰 مسافة الأرنب: <span id="rabbit-distance">?</span>م</div>
    </div>

    <div id="tap-counter"><div>🔵 <span id="remaining-taps">3</span></div></div>
    <div id="crosshair">+</div>
    <div id="interact-msg"></div>
    <div id="instructions"></div>

    <div id="touch-controls">
        <div id="left-joystick" ontouchstart="handleJoystickStart(event)" ontouchmove="handleJoystickMove(event)" ontouchend="handleJoystickEnd(event)">
            <div id="joystick-handle"></div>
        </div>
        <div id="right-buttons">
            <div id="jump-btn" class="action-btn" ontouchstart="setAction('jump', true)" ontouchend="setAction('jump', false)">🏃</div>
            <div id="sprint-btn" class="action-btn" ontouchstart="setAction('sprint', true)" ontouchend="setAction('sprint', false)">⚡</div>
            <div id="crouch-btn" class="action-btn" ontouchstart="setAction('crouch', true)" ontouchend="setAction('crouch', false)">⬇️</div>
            <div id="interact-btn" class="action-btn" ontouchstart="setAction('interact', true)" ontouchend="setAction('interact', false)">🔵</div>
            <div id="flashlight-btn" class="action-btn" ontouchstart="toggleFlashlight()">🔦</div>
        </div>
    </div>

    <div id="look-area" ontouchstart="handleLookStart(event)" ontouchmove="handleLookMove(event)" ontouchend="handleLookEnd(event)"></div>

        function handleLookStart(e) { e.preventDefault(); lookActive = true; const touch = e.touches[0]; lastTouchX = touch.clientX; lastTouchY = touch.clientY; document.getElementById('look-area').classList.add('look-area-active'); }
        function handleLookMove(e) { e.preventDefault(); if (!lookActive || !gameRunning || isGameOver || adShowing) return; const touch = e.touches[0]; const deltaX = touch.clientX - lastTouchX; const deltaY = touch.clientY - lastTouchY; yaw -= deltaX * LOOK_SENSITIVITY; pitch -= deltaY * LOOK_SENSITIVITY; pitch = Math.max(-1.4, Math.min(1.4, pitch)); lastTouchX = touch.clientX; lastTouchY = touch.clientY; if (camera) camera.rotation.set(pitch, yaw, 0, 'YXZ'); }
        function handleLookEnd(e) { e.preventDefault(); lookActive = false; document.getElementById('look-area').classList.remove('look-area-active'); }
        function handleJoystickStart(e) { e.preventDefault(); if (adShowing || isGameOver || gameWin) return; joystickActive = true; const touch = e.touches[0]; const rect = document.getElementById('left-joystick').getBoundingClientRect(); joystickStartX = rect.left + rect.width / 2; joystickStartY = rect.top + rect.height / 2; updateJoystick(touch.clientX, touch.clientY); }
        function handleJoystickMove(e) { e.preventDefault(); if (!joystickActive || adShowing || isGameOver || gameWin) return; const touch = e.touches[0]; updateJoystick(touch.clientX, touch.clientY); }
        function handleJoystickEnd(e) { e.preventDefault(); joystickActive = false; joystickVector.x = 0; joystickVector.y = 0; document.getElementById('joystick-handle').style.transform = 'translate(-50%, -50%)'; }
        function updateJoystick(touchX, touchY) { const dx = touchX - joystickStartX; const dy = touchY - joystickStartY; const distance = Math.sqrt(dx*dx + dy*dy); const maxDistance = 40; if (distance > maxDistance) { const angle = Math.atan2(dy, dx); joystickVector.x = Math.cos(angle); joystickVector.y = Math.sin(angle); } else { joystickVector.x = dx / maxDistance; joystickVector.y = dy / maxDistance; } const handle = document.getElementById('joystick-handle'); handle.style.transform = `translate(calc(-50% + ${joystickVector.x * maxDistance}px), calc(-50% + ${joystickVector.y * maxDistance}px))`; }
        function setAction(action, state) { if (adShowing) return; if (action === 'jump' && state && isGrounded && gameRunning && !isGameOver) { velocity = jumpPower; isGrounded = false; } if (action === 'sprint') keys['shift'] = state; if (action === 'crouch') isCrouching = state; if (action === 'interact' && state) { keys['e'] = true; setTimeout(() => { keys['e'] = false; }, 200); } }

        function updateTimer() { if (!gameRunning || isGameOver || gameWin) return; const elapsed = Math.floor((Date.now() - startTime) / 1000); const mins = Math.floor(elapsed / 60).toString().padStart(2, '0'); const secs = (elapsed % 60).toString().padStart(2, '0'); document.getElementById('time').innerText = `${mins}:${secs}`; }
        function updateBatteryDisplay() { document.getElementById('battery').innerText = Math.max(0, Math.floor(battery)); }

        function initThreeJS(mode) {
            scene = new THREE.Scene();
            let bgColor = 0x111122;
            switch(mode) {
                case 'normal': bgColor = 0x1a2a3a; break;
                case 'nightmare': bgColor = 0x0a0000; break;
                case 'halloween': bgColor = 0x1a0a00; break;
                case 'christmas': bgColor = 0x0a1030; break;
                case 'ramadan': bgColor = 0x1a1a2a; break;
                case 'eid-fitr': bgColor = 0x1a0a1a; break;
                case 'eid-adha': bgColor = 0x0a0000; break;
                case 'easter': bgColor = 0x4a2a4a; break;
            }
            scene.background = new THREE.Color(bgColor);
            scene.fog = new THREE.Fog(bgColor, 30, 130);

            camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);

            camera.add(flashlight);

            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            const ambientIntensity = brightness === 'bright' ? 0.45 : (brightness === 'darkest' ? 0.1 : 0.25);
            ambientLight = new THREE.AmbientLight(0xffffff, ambientIntensity);

            createYard(mode);
            createWalls();

            if (monsterSpeed > 0) spawnMonsterWithOutfit(mode);

            if (mode === 'normal') createSchoolDesks();
            if (mode === 'nightmare') setupNightmareEffects();

        function createBlueTaps() {
            const tapPositions = [];
            while (tapPositions.length < 3) {
                const x = (Math.random() - 0.5) * 90;
                const z = (Math.random() - 0.5) * 90;
                if (Math.abs(x) < 45 && Math.abs(z) < 45 && !tapPositions.some(p => Math.hypot(p[0]-x, p[2]-z) < 10)) {
                    tapPositions.push([x, 0.8, z]);
                }
            }
            tapPositions.forEach((pos, index) => {
                const tapGroup = new THREE.Group();
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.2), new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x004488 }));
                base.position.y = 0.1;
                tapGroup.add(base);
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,1.2), new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x004488 }));
                body.position.y = 0.7;
                tapGroup.add(body);
                const handle = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: 0x2266aa }));
                handle.position.set(0.3, 0.9, 0);
                tapGroup.add(handle);
                const spout = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.6), new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x004488 }));
                spout.rotation.z = Math.PI/2;
                spout.position.set(0.6, 0.6, 0);
                tapGroup.add(spout);
                const glowLight = new THREE.PointLight(0x0088ff, 2.0, 10);
                glowLight.position.set(0, 0.7, 0);
                tapGroup.add(glowLight);
                tapGroup.position.set(pos[0], pos[1], pos[2]);
                tapGroup.castShadow = true;
                scene.add(tapGroup);
                tapGroup.userData = { type: 'TAP', active: true, index: index, position: new THREE.Vector3(pos[0], pos[1], pos[2]) };
                interactables.push(tapGroup);
                tapGlows.push({ group: tapGroup, light: glowLight, pulseTime: Math.random() * 10 });
            });
        }

        function setupControls() {
            window.onkeydown = (e) => {
                if (adShowing) return;
                keys[e.key.toLowerCase()] = true;
                if (e.code === 'Space' && isGrounded && gameRunning && !isGameOver) { velocity = jumpPower; isGrounded = false; }
                if (e.key.toLowerCase() === 'f' && gameRunning && !isGameOver) { flashlightOn = !flashlightOn; if (flashlight) flashlight.intensity = flashlightOn ? 3.0 : 0; }
                if (e.key.toLowerCase() === 'r' && gameRunning && !isGameOver) { battery = Math.min(100, battery + 30); updateBatteryDisplay(); }
                if (e.key.toLowerCase() === 'control') { isCrouching = true; }
            };
            window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; if (e.key.toLowerCase() === 'control') { isCrouching = false; } };
            window.onmousemove = (e) => { if (document.pointerLockElement && !adShowing) { yaw -= e.movementX * 0.003; pitch -= e.movementY * 0.003; pitch = Math.max(-1.3, Math.min(1.3, pitch)); if (camera) camera.rotation.set(pitch, yaw, 0, 'YXZ'); } };
            if (renderer) { renderer.domElement.onclick = () => { if (!isGameOver && gameRunning && !adShowing) renderer.domElement.requestPointerLock(); }; }
        }

        function checkCollisionWithWalls() {
            const limit = 47;
            if (camera.position.x > limit) camera.position.x = limit;
            if (camera.position.x < -limit) camera.position.x = -limit;
            if (camera.position.z > limit) camera.position.z = limit;
            if (camera.position.z < -limit) camera.position.z = -limit;
        }

        function animate() {
            if (!gameRunning || isGameOver || gameWin || adShowing) { requestAnimationFrame(animate); return; }
            requestAnimationFrame(animate);

            velocity += gravity;
            camera.position.y += velocity;
            const targetHeight = isCrouching ? crouchHeight : playerHeight;
            currentPlayerHeight += (targetHeight - currentPlayerHeight) * 0.2;
            if (camera.position.y <= currentPlayerHeight) { camera.position.y = currentPlayerHeight; velocity = 0; isGrounded = true; }

            const isMoving = keys['w'] || keys['s'] || keys['a'] || keys['d'];
            if (keys['shift'] && isMoving && !isCrouching) currentSpeed = HUMAN_JOG_SPEED;
            else if (isCrouching) currentSpeed = CROUCH_SPEED;
            else currentSpeed = HUMAN_WALK_SPEED;

            if (keys['w']) { camera.position.x -= Math.sin(yaw) * currentSpeed; camera.position.z -= Math.cos(yaw) * currentSpeed; }
            if (keys['s']) { camera.position.x += Math.sin(yaw) * currentSpeed; camera.position.z += Math.cos(yaw) * currentSpeed; }
            if (keys['a']) { camera.position.x -= Math.cos(yaw) * currentSpeed; camera.position.z += Math.sin(yaw) * currentSpeed; }
            if (keys['d']) { camera.position.x += Math.cos(yaw) * currentSpeed; camera.position.z -= Math.sin(yaw) * currentSpeed; }
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            checkCollisionWithWalls();

            if (monster && monsterSpeed > 0) {
                const dir = new THREE.Vector3().subVectors(camera.position, monster.position).normalize();
                const dist = camera.position.distanceTo(monster.position);
                monsterDistance = dist;
                const speedMultiplier = Math.max(0.4, Math.min(1.2, 15 / Math.max(5, dist)));
                monster.position.x += dir.x * monsterSpeed * speedMultiplier;
                monster.position.z += dir.z * monsterSpeed * speedMultiplier;
                monster.lookAt(camera.position);
                document.getElementById('distance').innerText = Math.floor(dist);
                if (dist < 2.2 && !adShowing) triggerJumpscare();
            }

            if (rabbit && document.getElementById('game-mode').value === 'easter') {
                const dir = new THREE.Vector3().subVectors(camera.position, rabbit.position).normalize();
                const dist = camera.position.distanceTo(rabbit.position);
                rabbitDistance = dist;
                rabbit.position.x += dir.x * rabbitSpeed * 0.9;
                rabbit.position.z += dir.z * rabbitSpeed * 0.9;
                rabbit.lookAt(camera.position);
                document.getElementById('rabbit-distance').innerText = Math.floor(dist);
                if (dist < 2.0 && !adShowing) triggerJumpscare();
            }

            if (flashlightOn && gameRunning) { battery -= batteryDrainRate; if (battery < 0) battery = 0; updateBatteryDisplay(); if (battery <= 0) { flashlightOn = false; if (flashlight) flashlight.intensity = 0; } }

            tapGlows.forEach(tap => { if (tap.group.userData.active) { tap.pulseTime += 0.05; const pulse = 1.0 + Math.sin(tap.pulseTime) * 0.3; if (tap.light) tap.light.intensity = pulse; } });
            checkTapInteractions();

            const mode = document.getElementById('game-mode').value;
            if (mode === 'ramadan' && window.ramadanStarData) {
                window.ramadanStarData.time += 0.02;
                const intensity = 0.8 + Math.sin(window.ramadanStarData.time) * 0.4;
                if (window.ramadanStarData.light) window.ramadanStarData.light.intensity = intensity;
                if (window.ramadanStarData.group) {
                    const scale = 1 + Math.sin(window.ramadanStarData.time) * 0.05;
                    window.ramadanStarData.group.scale.set(scale, scale, scale);
                }
            }

            if (bloodParticles) { const pos = bloodParticles.geometry.attributes.position.array; for (let i = 1; i < pos.length; i += 3) { pos[i] -= 0.03; if (pos[i] < 0) pos[i] = 20; } bloodParticles.geometry.attributes.position.needsUpdate = true; }
            if (snowParticles) { const pos = snowParticles.geometry.attributes.position.array; for (let i = 1; i < pos.length; i += 3) { pos[i+1] -= 0.02; if (pos[i+1] < 0) pos[i+1] = 25; } snowParticles.geometry.attributes.position.needsUpdate = true; }
            renderer.render(scene, camera);
        }

        function checkTapInteractions() {
            const msgDiv = document.getElementById('interact-msg');
            let closestTap = null, closestDistance = INTERACT_DISTANCE + 1;
            interactables.forEach(tap => { if (tap.userData.active) { const distance = camera.position.distanceTo(tap.position); if (distance < closestDistance) { closestDistance = distance; closestTap = tap; } } });
            if (closestTap && closestDistance <= INTERACT_DISTANCE) { msgDiv.style.display = 'block'; msgDiv.innerText = translations[currentLang].interactMsg; if (keys['e']) { closeTap(closestTap); keys['e'] = false; } } else { msgDiv.style.display = 'none'; }
        }

        function closeTap(tap) {
            if (!tap.userData.active) return;
            tap.userData.active = false;
            tap.children.forEach(child => { if (child.material) { if (Array.isArray(child.material)) { child.material.forEach(mat => { mat.color.setHex(0x666666); if (mat.emissive) mat.emissive.setHex(0x222222); }); } else { child.material.color.setHex(0x666666); if (child.material.emissive) child.material.emissive.setHex(0x222222); } } });
            const tapGlow = tapGlows.find(t => t.group === tap); if (tapGlow && tapGlow.light) tapGlow.light.intensity = 0;
            sfxTapClose.play().catch(() => { });
            tapsRepaired++; document.getElementById('count').innerText = tapsRepaired; document.getElementById('remaining-taps').innerText = 3 - tapsRepaired;
            if (tapsRepaired >= 3) { sfxSuccess.play().catch(() => { }); triggerWin(); }
        }

        function triggerWin() {
            gameWin = true; isGameOver = true; gameRunning = false;
            stopMusic();
            document.getElementById('hud').style.display = 'none'; document.getElementById('tap-counter').style.display = 'none';
            document.getElementById('interact-msg').style.display = 'none'; document.getElementById('touch-controls').style.display = 'none';
            document.getElementById('look-area').style.display = 'none';
            sfxGhost.pause(); sfxHeartbeat.pause();
            document.getElementById('win-screen').style.display = 'flex';

        }

        function triggerJumpscare() {
            isGameOver = true; gameWin = false; gameRunning = false;
            stopMusic();
            sfxScream.play().catch(() => { });
            document.getElementById('hud').style.display = 'none'; document.getElementById('tap-counter').style.display = 'none';
            document.getElementById('interact-msg').style.display = 'none'; document.getElementById('touch-controls').style.display = 'none';
            document.getElementById('look-area').style.display = 'none';

            document.getElementById('jumpscare').style.display = 'flex';
            setTimeout(() => { document.getElementById('jumpscare').style.display = 'none'; AdSystem.showAdAndReturnToMenu(); }, 2000);
        }

        const AdSystem = {
            platform: 'unknown', adShowing: false, adChecked: false,
            detectPlatform: function() { const hostname = window.location.hostname; if (hostname.includes('y8.com')) this.platform = 'y8'; else if (hostname.includes('crazygames.com')) this.platform = 'crazygames'; else if (hostname.includes('gamedistribution.com')) this.platform = 'gamedistribution'; else if (hostname.includes('poki.com')) this.platform = 'poki'; else this.platform = 'simulator'; console.log('✅ منصة الإعلانات:', this.platform); return this.platform; },
            showAdAndReturnToMenu: function() {
                if (this.adShowing) return;
                this.adShowing = true; window.adShowing = true; this.adChecked = false;
                document.getElementById('hud').style.display = 'none'; document.getElementById('tap-counter').style.display = 'none';
                document.getElementById('interact-msg').style.display = 'none'; document.getElementById('touch-controls').style.display = 'none';
                document.getElementById('look-area').style.display = 'none';
                this.showSearchingUI();
                const timeoutId = setTimeout(() => { if (!this.adChecked) { this.hideAdUI(); this.adShowing = false; window.adShowing = false; returnToMenu(); } }, 5000);
                setTimeout(() => { if (!this.adChecked) { this.adChecked = true; clearTimeout(timeoutId); this.hideAdUI(); this.adShowing = false; window.adShowing = false; returnToMenu(); } }, 3000);
            },
            showSearchingUI: function() {
                let adContainer = document.getElementById('ad-container');
                if (!adContainer) { adContainer = document.createElement('div'); adContainer.id = 'ad-container'; document.body.appendChild(adContainer); }
                adContainer.innerHTML = `<div style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:10000; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:20px;"><div style="color:#ff3300; font-size:2.5rem; margin-bottom:30px; animation:adPulse 1.5s infinite;">🔍 جاري البحث عن إعلان...</div><div style="color:#00ffff; font-size:1.5rem; margin-bottom:20px;">سيتم العودة للقائمة بعد 5 ثواني</div><div style="width:300px; height:6px; background:#333; border-radius:3px; overflow:hidden;"><div id="search-progress" style="width:0%; height:100%; background:#ff3300; transition:width 5s linear;"></div></div></div>`;
                setTimeout(() => { const progress = document.getElementById('search-progress'); if (progress) progress.style.width = '100%'; }, 100);
                adContainer.style.display = 'flex';
            },
            hideAdUI: function() { const adContainer = document.getElementById('ad-container'); if (adContainer) adContainer.style.display = 'none'; }
        };

        window.AdSystem = AdSystem;
        window.adShowing = false;
        
        window.addEventListener('load', function() {
            AdSystem.detectPlatform();
            console.log('🚀 لعبة كسالة الحمام جاهزة');
            console.log('🏫 ساحة مدرسة كبيرة (100×100) ومغلقة بالجدران');
            console.log('🚶 سرعة اللاعب: مشي = 0.14 (5 كم/ساعة - سرعة إنسان عادي)');
            console.log('🏃 الهرولة: 0.24 (9 كم/ساعة - ركض خفيف)');
            console.log('👻 كسالة الحمام ترتدي لباساً خاصاً بكل وضع');
            console.log('🎵 الموسيقى تعمل فوراً وبشكل مستمر');
            console.log('🎄 وضع كريسماس: ثلج متساقط + هدايا + رجال ثلج + بابا نويل');
            console.log('🌙 وضع رمضان: فوانيس مضيئة + هلال ساطع + نجمة متوهجة');
            
            const music = document.getElementById('bg-music');
            music.volume = 0.35;
            music.loop = true;
            music.play().catch(e => console.log("⚠️ انتظر تفاعل المستخدم لتشغيل الموسيقى:", e));
            document.body.addEventListener('click', () => { if (music.paused) music.play().catch(()=>{}); }, { once: true });
        });
        
        setInterval(() => { document.getElementById('total-earnings-display').innerText = totalEarnings; }, 1000);
    </script>
